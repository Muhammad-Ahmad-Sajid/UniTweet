
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a2f4a' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#0C447C',
    secondaryColor: dark ? '#2a1f4a' : '#EEEDFE',
    tertiaryColor: dark ? '#1a3a2a' : '#E1F5EE',
  },
});

const diagram = `erDiagram
  users {
    serial user_id PK
    varchar reg_no UK
    varchar full_name
    varchar email UK
    varchar password_hash
    int batch_year
    varchar department
    timestamptz created_at
  }
  admins {
    serial admin_id PK
    varchar username UK
    varchar email UK
    varchar password_hash
    varchar role
    timestamptz created_at
  }
  tweets {
    serial tweet_id PK
    int user_id FK
    varchar content
    int like_count
    int reply_count
    bool is_deleted
    timestamptz created_at
    timestamptz updated_at
  }
  likes {
    int tweet_id FK
    int user_id FK
    timestamptz created_at
  }
  replies {
    serial reply_id PK
    int tweet_id FK
    int user_id FK
    int parent_reply_id FK
    varchar content
    bool is_deleted
    timestamptz created_at
  }
  follows {
    int follower_id FK
    int followee_id FK
    timestamptz created_at
  }
  direct_messages {
    serial message_id PK
    int sender_id FK
    int receiver_id FK
    varchar content
    bool is_read
    bool is_deleted
    timestamptz created_at
  }
  reports {
    serial report_id PK
    int reporter_id FK
    varchar target_type
    int target_id
    varchar reason
    varchar status
    int resolved_by FK
    timestamptz created_at
    timestamptz resolved_at
  }

  users ||--o{ tweets : "posts"
  users ||--o{ likes : "gives"
  users ||--o{ replies : "writes"
  users ||--o{ follows : "follows (as follower)"
  users ||--o{ follows : "followed by (as followee)"
  users ||--o{ direct_messages : "sends"
  users ||--o{ direct_messages : "receives"
  users ||--o{ reports : "submits"
  admins ||--o{ reports : "resolves"
  tweets ||--o{ likes : "has"
  tweets ||--o{ replies : "has"
  replies ||--o{ replies : "nested in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = nums.filter((_, i) => i % 2 === 0);
  const ys = nums.filter((_, i) => i % 2 === 1);
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
